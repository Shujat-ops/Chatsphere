<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatSphere — Create Account</title>
<link rel="icon" type="image/png" href="Assets/images/logo.png">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="Assets/css/style.css">
<style>
  .input-group-custom { margin-bottom: 14px; }
  @media (max-width: 576px) {
    .col-6 .input-group-custom input { font-size: 13px; }
    .glass-card { padding: 20px 14px; }
  }
</style>
</head>
<body>

<div class="animated-bg"></div>

<div class="container d-flex justify-content-center align-items-center min-vh-100 p-4">
    <div class="glass-card fade-in">

    
        <div class="brand-logo">
            <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:6px;">
                <img src="Assets/images/logo.png" style="width:44px;height:44px;border-radius:12px;object-fit:cover;box-shadow:0 0 16px rgba(0,245,255,0.3);">
                <div class="logo-text">Chat<span class="logo-dot">Sphere</span></div>
            </div>
            <div class="tagline">Connect &middot; Communicate &middot; Collaborate</div>
        </div>

        <h2 class="text-center mb-4 neon-text" style="font-size:0.95rem;">Create Account</h2>

        <form id="signupForm" novalidate >
            <div class="row g-3">
                <div class="col-6">
                    <div class="input-group-custom">
                        <i class="fas fa-user"></i>
                        <input type="text" id="firstName" placeholder="First Name" required>
                        <span class="error-msg">First name is required</span>
                    </div>
                </div>
                <div class="col-6">
                    <div class="input-group-custom">
                        <i class="fas fa-user"></i>
                        <input type="text" id="lastName" placeholder="Last Name" required>
                        <span class="error-msg">Last name is required</span>
                    </div>
                </div>
                <div class="col-6">
                    <div class="input-group-custom">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="mobile" placeholder="Mobile Number" required>
                        <span class="error-msg">10–15 digits required</span>
                    </div>
                </div>
                <div class="col-6">
                    <div class="input-group-custom">
                        <i class="fas fa-calendar"></i>
                        <input type="number" id="age" placeholder="Age (18–60)" required>
                        <span class="error-msg">Must be 18–60</span>
                    </div>
                </div>
                <div class="col-12">
                    <div class="input-group-custom">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="Email Address" required>
                        <span class="error-msg">Invalid email format</span>
                    </div>
                </div>
                <div class="col-6">
                    <div class="input-group-custom">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Password" required>
                        <i class="fas fa-eye toggle-pass"></i>
                        <span class="error-msg">Minimum 6 characters</span>
                    </div>
                </div>
                <div class="col-6">
                    <div class="input-group-custom">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                        <span class="error-msg">Passwords must match</span>
                    </div>
                </div>

                <div class="col-12">
                    <label class="form-label" style="font-size:12px;color:#607896;letter-spacing:1px;text-transform:uppercase;">
                        <i class="fas fa-image" style="color:#00f5ff;"></i>&nbsp; Profile Photo <span style="color:#607896;">(optional, max 600KB)</span>
                    </label>
                    <div class="document-upload">
                        <input type="file" id="profileImg" accept="image/jpeg,image/png,image/jpg">
                        <label for="profileImg" class="upload-btn"><i class="fas fa-upload"></i> Choose File</label>
                        <span id="fileName">No file chosen</span>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-luxury mt-4 w-100">
                <span class="btn-text">Create Account</span>
                <div class="spinner-border spinner-border-sm d-none ms-2" role="status"></div>
            </button>

            <div class="auth-divider mt-3">— already have an account? —</div>

            <a href="login.html" class="btn-luxury w-100 d-block text-center mt-2" style="text-decoration:none;background:rgba(0,245,255,0.08);color:var(--accent);border:1px solid rgba(0,245,255,0.2);font-weight:600;padding:12px;border-radius:12px;">
                Sign In
            </a>
        </form>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="Assets/js/firebase.js"></script>
<script src="Assets/js/auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
