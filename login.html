<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatSphere — Sign In</title>
    <link rel="icon" type="image/png" href="Assets/images/logo.png" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="Assets/css/style.css" />
  </head>
  <body>
    <div class="animated-bg"></div>

    <div
      class="container d-flex justify-content-center align-items-center min-vh-100 p-4"
    >
      <div class="glass-card fade-in" style="max-width: 440px">
        <div class="brand-logo">
          <div
            style="
              display: flex;
              align-items: center;
              justify-content: center;
              gap: 12px;
              margin-bottom: 6px;
            "
          >
            <img
              src="Assets/images/logo.png"
              style="
                width: 44px;
                height: 44px;
                border-radius: 12px;
                object-fit: cover;
                box-shadow: 0 0 16px rgba(0, 245, 255, 0.3);
              "
            />
            <div class="logo-text">
              Chat<span class="logo-dot">Sphere</span>
            </div>
          </div>
          <div class="tagline">
            Connect &middot; Communicate &middot; Collaborate
          </div>
        </div>

        <h2 class="text-center mb-4 neon-text" style="font-size: 0.95rem">
          Welcome Back
        </h2>

        <form id="loginForm" autocomplete="on" novalidate>
          <div class="row g-3">
            <div class="col-12">
              <div class="input-group-custom">
                <i class="fas fa-envelope"></i>
                <input
                  type="email" autocomplete="email"
                  id="loginEmail"
                  placeholder="Email Address"
                  required
                />
                <span class="error-msg">Email is required</span>
              </div>
            </div>
            <div class="col-12">
              <div class="input-group-custom">
                <i class="fas fa-lock"></i>
                <input
                  type="password" autocomplete="current-password"
                  id="loginPassword"
                  placeholder="Password"
                  required
                />
                <i class="fas fa-eye toggle-pass"></i>
                <span class="error-msg">Password is required</span>
              </div>
            </div>
            <div
              class="col-12 d-flex justify-content-between align-items-center"
              style="margin-top: -10px"
            >
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="rememberMe"
                  style="border-color: rgba(0, 245, 255, 0.3)"
                />
                <label
                  class="form-check-label"
                  for="rememberMe"
                  style="color: #607896; font-size: 13px"
                  >Remember Me</label
                >
              </div>
              <a
                href="#"
                style="color: #607896; font-size: 13px; text-decoration: none"
                >Forgot Password?</a
              >
            </div>
          </div>

          <button type="submit" class="btn-luxury mt-4 w-100">
            <span class="btn-text">Sign In</span>
            <div
              class="spinner-border spinner-border-sm d-none ms-2"
              role="status"
            ></div>
          </button>

          <div class="auth-divider mt-3">— new to ChatSphere? —</div>

          <a
            href="index.html"
            style="
              display: block;
              text-align: center;
              margin-top: 8px;
              padding: 12px;
              border-radius: 12px;
              background: rgba(0, 245, 255, 0.08);
              color: var(--accent);
              border: 1px solid rgba(0, 245, 255, 0.2);
              font-weight: 600;
              font-size: 14px;
              text-decoration: none;
              transition: 0.25s;
            "
            onmouseover="this.style.background = 'rgba(0,245,255,0.14)'"
            onmouseout="this.style.background = 'rgba(0,245,255,0.08)'"
          >
            Create Account
          </a>
        </form>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="Assets/js/firebase.js"></script>
    <script src="Assets/js/login.js"></script>
  </body>
</html>
